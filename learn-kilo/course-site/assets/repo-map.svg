  <text x="438" y="286" fill="#1F2430" font-size="20" font-family="Georgia, Noto Serif SC, serif" font-weight="700">gateway · telemetry · kilocode</text>
  <text x="438" y="316" fill="#5D6472" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif">平台能力、遥测、fork 差异落点</text>
