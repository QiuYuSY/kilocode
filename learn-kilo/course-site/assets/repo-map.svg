<svg width="800" height="520" viewBox="0 0 800 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="520" rx="28" fill="#FFF9F2"/>
  <rect x="36" y="40" width="220" height="140" rx="22" fill="#F2F9F8" stroke="#0D6B5D" stroke-width="2"/>
  <text x="60" y="76" fill="#0D6B5D" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">核心引擎</text>
  <text x="60" y="112" fill="#1F2430" font-size="26" font-family="Georgia, Noto Serif SC, serif" font-weight="700">packages/opencode</text>
  <text x="60" y="145" fill="#5D6472" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif">CLI、Server、Session、Agent、Tool</text>
  <rect x="290" y="40" width="470" height="140" rx="22" fill="#FFF4ED" stroke="#C8642D" stroke-width="2"/>
  <text x="316" y="76" fill="#C8642D" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">客户端层</text>
  <text x="316" y="114" fill="#1F2430" font-size="22" font-family="Georgia, Noto Serif SC, serif" font-weight="700">kilo-vscode · app · desktop</text>
  <text x="316" y="150" fill="#5D6472" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif">多个客户端围绕同一核心运行时建立</text>
  <rect x="36" y="212" width="350" height="122" rx="22" fill="#EEF3FB" stroke="#1D4F91" stroke-width="2"/>
  <text x="60" y="248" fill="#1D4F91" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">共享桥梁层</text>
  <text x="60" y="286" fill="#1F2430" font-size="20" font-family="Georgia, Noto Serif SC, serif" font-weight="700">sdk/js · kilo-ui · plugin</text>
  <text x="60" y="316" fill="#5D6472" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif">统一接口契约、UI 语言和扩展点</text>
  <rect x="414" y="212" width="346" height="122" rx="22" fill="#F6F1FB" stroke="#7A4DA6" stroke-width="2"/>
